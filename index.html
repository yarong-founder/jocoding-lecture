<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <meta name="google-adsense-account" content="ca-pub-4206971148013397">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4206971148013397"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle">Dark Mode</button>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <button id="generate-btn">Generate Numbers</button>
        <div id="results" class="results-grid"></div>

        <div class="contact-section">
            <hr>
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mreavnlk" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="이메일을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의 내용을 입력하세요"></textarea>
                </div>
                <button type="submit" class="submit-btn">보내기</button>
            </form>
        </div>

        <div id="disqus_thread_container" class="disqus-section">
            <hr>
            <h2>댓글</h2>
            <div id="disqus_thread"></div>
            <script>

                };

                var d = document, s = d.createElement('script');
                s.src = 'https://transtheborder.disqus.com/embed.js';

                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
