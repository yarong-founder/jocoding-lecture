<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Style Reference</title>
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    <header class="header">
        <h1 class="logo">trans_ the border</h1>
        <p class="subtitle">A curated collection of 20 fashion styles.</p>
    </header>

    <main class="container">
        <div id="style-grid" class="style-grid">
            <!-- Styles will be injected here by main.js -->
        </div>
    </main>

    <!-- Modal for Gallery -->
    <div id="gallery-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-header">
                <h2 id="modal-title"></h2>
                <p id="modal-description"></p>
                <p id="modal-brands"></p>
            </div>
            <div id="modal-gallery" class="gallery-grid">
                <!-- 50 images will be injected here -->
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 trans_ the border. Monotone Minimalist Archive.</p>
    </footer>

    <script src="main.js?v=1.3"></script>
</body>
</html>
