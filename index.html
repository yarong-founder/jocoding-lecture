<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Style Explorer</title>
  <link rel="icon" href="./favicon.ico" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <div>
        <div class="brand">Style Explorer</div>
        <div class="subtitle">이미지 기반으로 스타일을 탐색하고, 클릭하면 원본 소스와 관련 힌트를 확인합니다.</div>
      </div>

      <nav class="nav">
        <a class="nav__link" href="#/">Home</a>
        <a class="nav__link" href="#/bookmarks">Bookmarks</a>
      </nav>
    </div>
  </header>

  <main class="container" id="app"></main>

  <!-- Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__overlay" data-close="1"></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__header">
        <div>
          <div class="modal__title" id="modalTitle">Title</div>
          <div class="modal__meta" id="modalMeta">Source</div>
        </div>
        <button class="btn btn--ghost" id="modalClose">Close</button>
      </div>

      <div class="modal__body">
        <div class="modal__thumb" id="modalThumb"></div>

        <div class="section">
          <div class="section__title">Look breakdown</div>
          <ul class="list" id="modalItems"></ul>
        </div>

        <div class="section" id="modalBrandsWrap" style="display:none;">
          <div class="section__title">Related brands</div>
          <div class="chips" id="modalBrands"></div>
        </div>
      </div>

      <div class="modal__footer">
        <button class="btn" id="modalBookmark">Bookmark</button>
        <a class="btn btn--primary" id="modalVisit" href="#" target="_blank" rel="noreferrer">View original →</a>
      </div>
    </div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
